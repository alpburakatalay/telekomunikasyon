<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Havok Mitnick</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/style1.css" id="themeLink">
</head>
<body>
    <!-- 🎨 TEMA SEÇİCİ -->
    <div id="themeSelector" class="theme-selector">
        <label for="themeSelect">Tema Seç:</label>
        <select id="themeSelect" onchange="changeTheme(this.value)">
            <option value="css/style1.css">Dark Terminal</option>
            <option value="css/style2.css">Light Mode</option>
            <option value="css/style3.css">Matrix Green</option>
            <option value="css/style4.css">Cyberpunk Pink</option>
            <option value="css/style5.css">Ocean Blue</option>
            <option value="css/style6.css">Forest Green</option>
            <option value="css/style7.css">Sunset Orange</option>
            <option value="css/style8.css">Purple Haze</option>
            <option value="css/style9.css">Red Alert</option>
            <option value="css/style10.css">Retro Apple II</option>
            <option value="css/style11.css">Windows 95</option>
            <option value="css/style12.css">Dracula Dark</option>
            <option value="css/style13.css">Monokai</option>
            <option value="css/style14.css">Solarized Dark</option>
            <option value="css/style15.css">Solarized Light</option>
        </select>
    </div>

    <!-- 🔐 ŞİFRE EKRANI -->
    <div id="login" class="login-container">
        <div class="login-box">
            <h2>Giriş Sistemi</h2>
            <input type="password" id="password" placeholder="şifre gir">
            <button onclick="checkPassword()">Giriş</button>
            <p class="hint">Demo şifre: <code>Just Friends</code></p>
        </div>
    </div>

    <!-- 💻 TERMİNAL -->
    <div id="terminal" class="terminal-container" style="display:none;">
        <div class="terminal-header">
            <h2>Havok Mitnick</h2>
            <button class="logout-btn" onclick="logout()">Çıkış</button>
        </div>
        <div id="log" class="terminal-log">hazır...</div>
        <div class="terminal-input-area">
            <input id="input" class="terminal-input" placeholder="yaz..." />
            <button onclick="send()" class="terminal-button">Gönder</button>
        </div>
    </div>

    <script>
        /* 🔐 ŞİFRE SİSTEMİ */
        const SITE_PASSWORD = "Password";

        function checkPassword(){
            let p = document.getElementById("password").value;
            if(p === SITE_PASSWORD){
                document.getElementById("login").style.display = "none";
                document.getElementById("terminal").style.display = "block";
                document.getElementById("themeSelector").style.display = "block";
                log("Erişim verildi");
            } else {
                alert("Yanlış şifre!");
                document.getElementById("password").value = "";
            }
        }

        function logout(){
            document.getElementById("login").style.display = "flex";
            document.getElementById("terminal").style.display = "none";
            document.getElementById("password").value = "";
            log("");
        }

        /* 🤖 TELEGRAM BOT KONFİGURASYONU */
        // ⚠️ GÜVENLİK NOTU: Gerçek token ve chat ID'yi buraya girin
        const TOKEN = "8833775867:AAE6caHaw_mBlSEe0MwXo-JmvDWQJDqJeMA";
	const CHAT_ID = "8510264483";

let lastUpdateId = 0;

        /* 🎨 TEMA DEĞİŞTİRİCİ */
        function changeTheme(themePath){
            document.getElementById("themeLink").href = themePath;
            localStorage.setItem("selectedTheme", themePath);
        }

        // Sayfa yüklenirken kaydedilmiş temayı uygula
        window.addEventListener("load", () => {
            const savedTheme = localStorage.getItem("selectedTheme");
            if(savedTheme){
                document.getElementById("themeLink").href = savedTheme;
                document.getElementById("themeSelect").value = savedTheme;
            }
        });

        /* 📝 LOG FONKSİYONU */
        function log(t){
            const logElement = document.getElementById("log");
            if(t === ""){
                logElement.innerHTML = "hazır...";
            } else {
                logElement.innerHTML += "<br>> " + t;
                logElement.scrollTop = logElement.scrollHeight;
            }
        }

        /* 🚀 MESAJ GÖNDER */
        async function send(){
            let text = document.getElementById("input").value.trim();
            if(!text) return;
            
            if(!TOKEN){
    log("❌ Token yok");
    return;
}

if(!CHAT_ID){
    log("❌ Chat ID yok");
    return;
}
            
            log(" sen: " + text);
            
            try {
                const response = await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: text
                    })
                });
                
                if(response.ok){
                    log("Gönderildi");
                } else {
                    log("Gönderme hatası");
                }
            } catch(error){
                log("Bağlantı hatası: " + error.message);
            }
            
            document.getElementById("input").value = "";
        }

        /* ⌨️ ENTER TUŞU */
        document.addEventListener("DOMContentLoaded", function(){
            const input = document.getElementById("input");
            if(input){
                input.addEventListener("keydown", function(e){
                    if(e.key === "Enter"){
                        send();
                    }
                });
            }
        });

        /* 📥 GELEN MESAJLARI DİNLE */
        setInterval(async () => {
           if(!TOKEN) return;
            
            try {
                let res = await fetch(
  `https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=10`
);
                let data = await res.json();
                
                if(data.ok && data.result){
                    data.result.forEach(u => {
                        if (u.update_id > lastUpdateId && u.message) {
                            lastUpdateId = u.update_id;
                            let user = u.message.from.first_name || "Kullanıcı";
                            let text = u.message.text;
                            log(" " + user + ": " + text);
                        }
                    });
                }
            } catch(error){
                // Sessiz başarısız
            }
        }, 2000);
    </script>
</body>
</html>
